<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
<script src="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<!DOCTYPE html>
<html>
<head>
	<title>Shopping Page</title>
	<!--Bootsrap 4 CDN-->
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    
    <!--Fontawesome CDN-->
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">

	<!--Custom styles-->
	<link rel="stylesheet" type="text/css" href="styles.css">
	<style>
		.product-card {
			background-color: rgba(0,0,0,0.5) !important;
			border: 1px solid #FFC312;
			border-radius: 8px;
			padding: 20px;
			margin-bottom: 20px;
			color: white;
			transition: transform 0.3s ease;
		}

		.product-card:hover {
			transform: translateY(-5px);
			box-shadow: 0 5px 15px rgba(255, 195, 18, 0.3);
		}

		.product-name {
			color: #FFC312;
			font-weight: bold;
			font-size: 18px;
			margin-bottom: 10px;
		}

		.product-price {
			color: white;
			font-size: 16px;
			margin-bottom: 10px;
		}

		.product-category {
			color: #ccc;
			font-size: 12px;
			margin-bottom: 15px;
		}

		.add-to-cart-btn {
			background-color: #FFC312;
			color: black;
			border: none;
			border-radius: 5px;
			padding: 8px 20px;
			cursor: pointer;
			font-weight: bold;
			transition: background-color 0.3s ease;
		}

		.add-to-cart-btn:hover {
			background-color: white;
			color: black;
		}

		.shopping-title {
			color: white;
			margin-bottom: 40px;
			text-align: center;
			font-size: 32px;
		}

		.shopping-container {
			height: 100%;
			padding: 40px 0;
		}

		.cart-summary {
			background-color: rgba(0,0,0,0.5) !important;
			border: 2px solid #FFC312;
			border-radius: 8px;
			padding: 20px;
			color: white;
			position: sticky;
			top: 20px;
		}

		.cart-summary h3 {
			color: #FFC312;
			margin-bottom: 20px;
		}

		.cart-item {
			display: flex;
			justify-content: space-between;
			padding: 10px 0;
			border-bottom: 1px solid #FFC312;
			font-size: 14px;
		}

		.cart-total {
			margin-top: 20px;
			padding-top: 20px;
			border-top: 2px solid #FFC312;
			font-size: 18px;
			font-weight: bold;
		}

		.checkout-btn {
			background-color: #FFC312;
			color: black;
			border: none;
			border-radius: 5px;
			padding: 12px 20px;
			cursor: pointer;
			font-weight: bold;
			width: 100%;
			margin-top: 20px;
			transition: background-color 0.3s ease;
		}

		.checkout-btn:hover {
			background-color: white;
			color: black;
		}

		.empty-cart {
			color: #FFC312;
			text-align: center;
			padding: 20px;
		}

		.back-link {
			color: white;
			margin-bottom: 20px;
			display: inline-block;
		}

		.back-link:hover {
			color: #FFC312;
			text-decoration: none;
		}
	</style>
</head>
<body>
<div class="shopping-container">
	<div class="container">
		<a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al Login</a>
		
		<div class="shopping-title">
			<i class="fas fa-shopping-bag"></i> Tienda de Productos
		</div>

		<div class="row">
			<!-- Productos -->
			<div class="col-md-8">
				<div id="products-container"></div>
			</div>

			<!-- Carrito de Compra -->
			<div class="col-md-4">
				<div class="cart-summary">
					<h3><i class="fas fa-shopping-cart"></i> Mi Carrito</h3>
					<div id="cart-items"></div>
					<div class="cart-total">
						Total: <span id="total-price">$0</span>
					</div>
					<button class="checkout-btn" id="checkoutBtn">Procesar Compra</button>
					<button class="checkout-btn" style="background-color: #666; margin-top: 10px;" id="clearCartBtn">Limpiar Carrito</button>
				</div>
			</div>
		</div>
	</div>
</div>

<script src="shop.js"></script>
</body>
</html>
